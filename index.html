<body>
<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<main class="app">
  <!-- Top-right: Theme toggle + brand (fixed, no extra vertical space) -->
  <div class="top-right-controls" id="topRightControls">
    <button class="theme-toggle btn btn-sm btn-outline-light" id="themeToggle" title="تغيير الثيم">🌓</button>
    <div class="brand-badge" id="brandBadge"><span class="brand-main">Mando</span><span class="brand-sub">Gsm</span></div>
  </div>
<div class="card p-3 p-md-4">
<div class="sticky-controls">
<div class="row g-3 align-items-end">
<div class="col-12 col-md-4">
<label class="form-label fw-semibold">ملف Excel</label>
<input accept=".xlsx,.xls,.csv" class="form-control" id="fileInput" type="file"/>
</div>
<div class="col-6 col-md-3">
<label class="form-label fw-semibold">ورقة العمل (Sheet)</label>
<select class="form-select" disabled="" id="sheetSelect"></select>
</div>
<div class="col-12 col-md-3" id="byteConvert" style="display:none;">
<label class="form-label fw-semibold">تحويل بايت → ميجا</label>
<input class="form-control" id="byteInput" placeholder="اكتب القيمة بالبايت…" type="number"/>
<div class="mt-2 small byte-result">( <span id="mbResult">0</span> ميجا و <span id="kbResult">0</span> كيلو بايت )</div>
</div>
<div class="col-6 col-md-2">
<label class="form-label fw-semibold">الفلترة</label>
<select class="form-select" id="filterSelect">
<option value="ALL">الكل</option>
<option value="BALANCE">Balance-only</option>
<option value="UNITS">Units-only</option>
<option value="JUNK">Junk</option>
<option value="BONUS">سلفنى</option>
</select>
</div>
<div class="col-6 col-md-2">
<label class="form-label fw-semibold">حجم الصفحة</label>
<select class="form-select" id="pageSize">
<option>50</option>
<option selected="">100</option>
<option>250</option>
<option>500</option>
</select>
</div>
  <!-- زر التحويل إلى العرض المختصر. يظهر هنا بدلاً من مربع الفلترة المختصرة السابق -->
  <div class="col-6 col-md-2" id="compactModeCol">
    <!-- نستخدم مسافة غير مكسورة للحفاظ على محاذاة العناصر دون نص فعلي -->
    <label class="form-label fw-semibold">&nbsp;</label>
    <button class="btn btn-sm btn-outline-primary w-100" id="compactModeBtn">مختصر</button>
  </div>
</div>
<hr class="mt-3 mb-3"/>
</div>

  <!-- صف العرض المختصر: يحوي أزرار العودة والتحديث وجدول العرض المختصر -->
  <div class="row g-3 mb-2" id="compactFilterRow">
    <div class="col-12">
      <div class="d-flex align-items-center gap-2">
        <!-- زر العودة لإظهار الجدول الكامل. مخفي حتى يتم تفعيل العرض المختصر -->
        <button class="btn btn-sm btn-secondary" id="compactReturnBtn" style="display:none;">إظهار الجدول الكامل</button>
        <!-- زر تحديث البيانات المختصرة. مخفي حتى يتم تفعيل العرض المختصر -->
        <button class="btn btn-sm btn-warning" id="compactRefreshBtn" style="display:none;">تحديث البيانات المختصرة</button>
      </div>
      <!-- غلاف جدول مختصر (يُضاف له class="table-wrap" عند التفعيل لضمان السحب) -->
      <div id="compactTableWrap" class="mt-2" style="display:none;"></div>
    </div>
  </div>
  <!-- شريط الجمع السريع للصفوف المحددة -->
<div class="row g-3 mb-2">
<div class="col-12">
<div class="d-flex align-items-center justify-content-between sum-bar">
<div class="small d-flex flex-wrap gap-4 align-items-start" id="sumSelectedBar">
<div class="sum-block">
<div><strong>مجموع Total Fee (للصفوف المحددة):</strong>
<span class="ms-2" id="sumSelectedFee">0</span></div>
<div class="small text-muted" id="sumSelectedFeeDetails" style="direction: rtl;"></div>
</div>
<div class="sum-block">
<div><strong>مجموع Free Unit Consumed (للصفوف المحددة):</strong>
<span class="ms-2" id="sumSelectedUnits">0</span></div>
<div class="small text-muted" id="sumSelectedUnitsDetails" style="direction: rtl;"></div>
</div>
</div>
<div class="small text-muted">
<label class="me-2">
<input id="checkAllVisible" type="checkbox"/>
                تحديد كل الظاهر
              </label>
<button class="btn btn-sm btn-outline-secondary" id="clearSelection">إلغاء التحديد</button>
</div>
</div>
</div>
</div>
<!-- الجدول صار بعرض الصفحة كامل -->
<div class="row g-4">
<div class="col-12">
<div class="d-flex justify-content-between align-items-center mb-2">
<div class="small">الصفحة: <span id="pageInfo">—</span> <span class="mx-2">|</span> <span id="selectedCount">0</span> <span class="mx-2">|</span> <span class="speed-label">التحكم بسرعة السحب للماوس ←</span> <span class="speed-ctrl mx-1" title="سرعة السحب"><button class="btn btn-xs btn-outline-light" id="speedDown">▼</button><span class="mx-1" id="dragSpeedVal">1.0x</span><button class="btn btn-xs btn-outline-light" id="speedUp">▲</button></span></div>
<div class="btn-group">
<button class="btn btn-sm btn-outline-secondary" id="prevPage">السابق</button>
<button class="btn btn-sm btn-outline-secondary" id="nextPage">التالي</button>
</div>
</div>
<div class="table-wrap">
<table class="table table-striped table-hover table-sm align-middle" id="dataTable">
<thead></thead>
<tbody></tbody>
</table>
</div>
</div>
</div>
<!-- Breakdown Panel -->
<div class="mt-3 consumption-box" id="consumptionBreakdown"></div>
</div>
</main>

<!-- ملفات الفلترة المختصرة (CSS & JS) -->
</body>
</html>
